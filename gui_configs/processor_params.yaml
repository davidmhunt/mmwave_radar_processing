processors:
  range_angle_resp:
    num_angle_bins: 64
    rx_antennas: [0,3,4,7]
    chirp_idx: 0
  range_doppler_resp:
    rx_idx: 0
  micro_doppler_resp:
    target_ranges: [0.5, 2.0]
    num_frames_history: 20
    rx_idx: 0
  doppler_azimuth_resp:
    num_angle_bins: 64
    valid_angle_range: [-1.04719755, 1.04719755]
    min_zoom_fft_vel_span: 0.1
    rx_antennas: [4,5,8,9]
    range_window: [0.9,2.0]
    shift_angle: false
    use_precise_fft: false
    precise_vel_range: [-0.25, 0.25]
  range_resp:
    chirp_idx: 0
  range_detector:
    cfar_type: "os_cfar_1d"
    cfar_params:
      num_train: 5
      num_guard: 3
      rho: 0.5
      alpha: 2
  altimeter:
    min_altitude_m: 25.0e-2
    zoom_search_region_m: 20.0e-2
    altitude_search_limit_m: 40e-2
    range_bias: 0.0
    precise_est_enabled: false
  range_doppler_detector_2d:
    cfar_type: "os_cfar_2d"
    cfar_params:
      num_train: [5,5]
      num_guard: [3,2]
      rho: 0.7
      alpha: 2
  range_doppler_detector_sequential:
    rng_cfar_type: "os_cfar_1d"
    rng_cfar_params:
      num_train: 5
      num_guard: 3
      rho: 0.6
      alpha: 2
    vel_cfar_type: "os_cfar_1d"
    vel_cfar_params:
      num_train: 5
      num_guard: 2
      rho: 0.7
      alpha: 3
  range_doppler_ground_detector:
    vel_cfar_type: "os_cfar_1d"
    vel_cfar_params:
      num_train: 16
      num_guard: 4
      rho: 0.5
      alpha: 12
    altimeter_params:
      min_altitude_m: 25.0e-2
      zoom_search_region_m: 20.0e-2
      altitude_search_limit_m: 40e-2
      range_bias: 0.0
      precise_est_enabled: false
  point_cloud_generator:
    detector_type: "range_doppler_ground_detector"
    detector_params:
      vel_cfar_type: "os_cfar_1d"
      vel_cfar_params:
        num_train: 12
        num_guard: 4
        rho: 0.5
        alpha: 15
      altimeter_params:
        min_altitude_m: 25.0e-2
        zoom_search_region_m: 20.0e-2
        altitude_search_limit_m: 40e-2
        range_bias: 0.0
        precise_est_enabled: false
    az_antenna_idxs: [0,3,4,7]
    el_antenna_idxs: [9,8,5,4]
    shift_az_resp: true
    shift_el_resp: false